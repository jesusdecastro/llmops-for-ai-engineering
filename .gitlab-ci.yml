# ─────────────────────────────────────────────────────────────
# CI/CD para Prompts — GitLab CI
# ─────────────────────────────────────────────────────────────
# Pipeline de 3 stages: push → evaluate → promote
#
# Triggers:
#   - Merge Request hacia development (CI: staging + evaluate)
#   - Push a development (CD: staging + evaluate + promote a production)
#   - Ejecución manual desde la web (CI/CD → Pipelines → Run pipeline)
#
# Variables requeridas (Settings → CI/CD → Variables, con Mask):
#   LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_BASE_URL
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN, AWS_DEFAULT_REGION
# ─────────────────────────────────────────────────────────────

stages:
  - push
  - evaluate
  - promote

# ─────────────────────────────────────────────────────────────
# Configuración reutilizable
# ─────────────────────────────────────────────────────────────
.python-setup: &python-setup
  image: python:3.11-slim
  before_script:
    - pip install --quiet -e ".[llmops]"

# ─────────────────────────────────────────────────────────────
# Stage 1: CI — Subir prompt a Langfuse con label "staging"
# Se ejecuta en: MR → development, push a development, dispatch web
# ─────────────────────────────────────────────────────────────
push-prompt:
  <<: *python-setup
  stage: push
  rules:
    # Dispatch manual desde la web
    - if: $CI_PIPELINE_SOURCE == "web"
    # Merge Request hacia development
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "development"
      changes:
        - prompts/**
    # Push a development (merge completado)
    - if: $CI_COMMIT_BRANCH == "development"
      changes:
        - prompts/**
  script:
    - bash scripts/cicd/push-prompt.sh prompts/system_prompt.txt "gitlab-ci[bot]"

# ─────────────────────────────────────────────────────────────
# Stage 2: Quality Gate — Evaluar prompt en staging
# Se ejecuta en: MR → development, push a development, dispatch web
# ─────────────────────────────────────────────────────────────
evaluate-prompt:
  <<: *python-setup
  stage: evaluate
  needs: [push-prompt]
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "development"
      changes:
        - prompts/**
    - if: $CI_COMMIT_BRANCH == "development"
      changes:
        - prompts/**
  script:
    - bash scripts/cicd/evaluate-prompt.sh staging 0.7

# ─────────────────────────────────────────────────────────────
# Stage 3: CD — Promover staging → production
# Se ejecuta en: push a development (post-merge), dispatch web
# NO se ejecuta en MRs (solo validación, no deploy)
# ─────────────────────────────────────────────────────────────
promote-prompt:
  <<: *python-setup
  stage: promote
  needs: [evaluate-prompt]
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH == "development"
      changes:
        - prompts/**
  script:
    - bash scripts/cicd/promote-prompt.sh staging production
