name: "Prompt CI — Staging"

# ─────────────────────────────────────────────────────────────
# CI: Validación de prompts en PRs hacia development
#
# Flujo:
#   1. PR abierto/actualizado → push prompt a staging → evaluar
#   2. workflow_dispatch → ejecución manual desde la web
#
# Este workflow actúa como quality gate: si la evaluación falla,
# el PR no se puede mergear (configurar como required check).
# ─────────────────────────────────────────────────────────────
on:
  pull_request:
    paths:
      - "prompts/**"
    branches:
      - development
  workflow_dispatch:
    inputs:
      prompt_file:
        description: "Ruta al archivo de prompt"
        required: false
        default: "prompts/system_prompt.txt"
      threshold:
        description: "Umbral mínimo de calidad (0.0 – 1.0)"
        required: false
        default: "0.7"

# ─────────────────────────────────────────────────────────────
# Variables de entorno comunes a todos los jobs
# ─────────────────────────────────────────────────────────────
env:
  PYTHON_VERSION: "3.11"
  LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
  LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
  LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
  AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION || 'eu-west-1' }}

jobs:
  # ───────────────────────────────────────────────────────────
  # Job 1: CI — Subir prompt a Langfuse con label "staging"
  # ───────────────────────────────────────────────────────────
  push-to-langfuse:
    name: "📤 Push prompt → Langfuse [staging]"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[llmops]"

      - name: Push prompt to Langfuse
        run: bash scripts/cicd/push-prompt.sh "${{ inputs.prompt_file || 'prompts/system_prompt.txt' }}" "github-actions[bot]"

  # ───────────────────────────────────────────────────────────
  # Job 2: Quality Gate — Evaluar el prompt en staging
  # ───────────────────────────────────────────────────────────
  evaluate:
    name: "🧪 Evaluate prompt [staging]"
    needs: push-to-langfuse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[llmops]"

      - name: Run evaluation suite
        run: bash scripts/cicd/evaluate-prompt.sh staging "${{ inputs.threshold || '0.7' }}"
